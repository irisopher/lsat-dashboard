<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lsat dashboard. 150 → 170</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f3ec;
    --card: #f0ebe0;
    --border: #d6cdb8;
    --text: #2a2620;
    --muted: #7a7060;
    --olive: #6b7355;
    --olive-light: #eaecda;
    --brown: #8b6f4e;
    --brown-light: #f2e8da;
    --mauve: #9b8a9e;
    --mauve-light: #eee8f0;
    --white: #faf7f2;
    --check: #6b7355;
  }

  body {
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    margin-bottom: 2.5rem;
  }

  .week-eyebrow {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--olive);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab {
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    color: var(--muted);
    background: none;
    border: none;
    padding: 8px 14px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--text);
    border-bottom-color: var(--olive);
    font-weight: 500;
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* DAY CARDS */
  .day-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .day-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .day-card.open .day-header {
    border-bottom-color: var(--border);
  }

  .day-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .day-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .day-tag {
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 10px;
  }

  .tag-momentum { background: var(--brown-light); color: var(--brown); }
  .tag-lsat { background: var(--olive-light); color: var(--olive); }
  .tag-rc { background: var(--mauve-light); color: var(--mauve); }

  .day-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .day-meta { font-size: 11px; color: var(--muted); }

  .chevron {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .day-card.open .chevron { transform: rotate(180deg); }

  .day-body {
    display: none;
    padding: 12px 16px 16px;
  }

  .day-card.open .day-body { display: block; }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 12px;
  }

  .section-label:first-child { margin-top: 0; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 10px 0;
  }

  /* TASKS */
  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 4px 0;
    cursor: pointer;
  }

  .checkbox {
    width: 17px;
    height: 17px;
    min-width: 17px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
  }

  .task-row.done .checkbox {
    background: var(--check);
    border-color: var(--check);
  }

  .checkmark {
    display: none;
    width: 9px;
    height: 7px;
  }

  .checkmark path {
    stroke: white;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .task-row.done .checkmark { display: block; }

  .task-info { flex: 1; }

  .task-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
    transition: color 0.15s;
  }

  .task-row.done .task-text {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* NOTES SECTION */
  .notes-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-top: 1.5rem;
  }

  .notes-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 12px;
  }

  .notes-label {
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
    margin-top: 14px;
  }

  .notes-label:first-of-type { margin-top: 0; }

  textarea {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    line-height: 1.5;
  }

  textarea:focus { border-color: var(--olive); }

  /* ARCHIVE */
  .archive-empty {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    padding: 1rem 0;
  }

  .archive-week {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
  }

  .archive-week-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 4px;
  }

  .archive-week-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .archive-notes {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
  }

  /* SAVE BUTTON */
  .save-btn {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 10px;
    background: var(--olive);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .save-btn:hover { opacity: 0.88; }

  .save-confirm {
    font-size: 12px;
    color: var(--olive);
    text-align: center;
    margin-top: 6px;
    height: 16px;
    transition: opacity 0.3s;
  }

  /* QUOTE */
  .quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    border-left: 2px solid var(--border);
    padding-left: 12px;
    margin: 1.5rem 0 0;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="week-eyebrow" id="week-label">week of june 29</div>
    <div class="title">lsat dashboard.</div>
    <div class="subtitle">150 → 170 &nbsp;·&nbsp; target: october 2026</div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill"></div>
      </div>
      <div class="progress-label" id="prog-label">0 / 0 tasks</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showPanel('this-week')">this week</button>
    <button class="tab" onclick="showPanel('notes')">weekly notes</button>
    <button class="tab" onclick="showPanel('archive')">archive</button>
  </div>

  <!-- THIS WEEK -->
  <div class="panel active" id="panel-this-week">
    <div id="day-grid"></div>
  </div>

  <!-- NOTES -->
  <div class="panel" id="panel-notes">
    <div class="notes-card">
      <div class="notes-title">weekly reflection</div>

      <div class="notes-label">what went well?</div>
      <textarea id="note-well" placeholder="moments of flow, questions that clicked, days you showed up..."></textarea>

      <div class="notes-label">what was hard?</div>
      <textarea id="note-hard" placeholder="error patterns, low-energy days, anything that felt stuck..."></textarea>

      <div class="notes-label">top 2 weak areas from demon analytics</div>
      <textarea id="note-weak" placeholder="e.g. necessary assumption, RC inference questions..." style="min-height:44px;"></textarea>

      <div class="notes-label">anything else</div>
      <textarea id="note-other" placeholder="thoughts, feelings, breakthroughs, whatever..."></textarea>

      <button class="save-btn" onclick="saveNotes()">save notes</button>
      <div class="save-confirm" id="save-confirm"></div>
    </div>
  </div>

  <!-- ARCHIVE -->
  <div class="panel" id="panel-archive">
    <div id="archive-list"></div>
  </div>

  <div class="quote">"I saw my life branching out before me like the green fig tree in the story..." — Sylvia Plath</div>

</div>

<script>
const DAYS = [
  {
    name: "sunday", tag: "get it done", tagClass: "tag-momentum", meta: "~1 hr", open: true,
    sections: [
      { label: "first things first", tasks: [
        { text: "wake up, drink a full glass of water", time: "5 min" },
        { text: "eat breakfast + make coffee", time: "20 min" }
      ]},
      { label: "the main event", tasks: [
        { text: "argumentative writing practice run", time: "35 min" }
      ]}
    ]
  },
  {
    name: "monday", tag: "test day", tagClass: "tag-lsat", meta: "~1.5 hrs", open: true,
    sections: [
      { label: "wake up routine", tasks: [
        { text: "water immediately on waking", time: "2 min" },
        { text: "light breakfast + coffee", time: "20 min" },
        { text: "10–15 min easy LR warmup — questions you already know well", time: "15 min" }
      ]},
      { label: "the real thing", tasks: [
        { text: "proctored argumentative writing section", time: "35 min" },
        { text: "start reading The Loophole — just chapter 1, no pressure", time: "30 min" }
      ]}
    ]
  },
  {
    name: "tuesday", tag: "LR day", tagClass: "tag-lsat", meta: "~2.5 hrs", open: false,
    sections: [
      { label: "momentum builders", tasks: [
        { text: "read a chapter of whatever you're reading", time: "20 min" },
        { text: "4 pages of your magazine or sketchbook", time: "15 min" }
      ]},
      { label: "lsat block", tasks: [
        { text: "LSAT Demon: 10 LR questions, slow and deliberate", time: "40 min" },
        { text: "error log: name the specific error type for each wrong answer", time: "20 min" },
        { text: "The Loophole: keep reading, note what clicks", time: "30 min" }
      ]}
    ]
  },
  {
    name: "wednesday", tag: "RC day", tagClass: "tag-rc", meta: "~2.5 hrs", open: false,
    sections: [
      { label: "momentum builders", tasks: [
        { text: "15 min of gesture drawings", time: "15 min" },
        { text: "make your coffee, settle in", time: "10 min" }
      ]},
      { label: "lsat block", tasks: [
        { text: "LSAT Demon: 2 RC passages, untimed, annotate as you go", time: "50 min" },
        { text: "error log: focus on inference questions specifically", time: "20 min" },
        { text: "7Sage: one concept video on RC question types", time: "20 min" }
      ]}
    ]
  },
  {
    name: "thursday", tag: "LR day", tagClass: "tag-lsat", meta: "~2.5 hrs", open: false,
    sections: [
      { label: "momentum builders", tasks: [
        { text: "something small and fun — drawing, reading, music", time: "15 min" }
      ]},
      { label: "lsat block", tasks: [
        { text: "LSAT Demon: 10 LR questions, slow and deliberate", time: "40 min" },
        { text: "error log update — are your error types repeating?", time: "20 min" },
        { text: "The Loophole: keep going, note anything that shifts how you think", time: "30 min" }
      ]}
    ]
  },
  {
    name: "friday", tag: "mixed review", tagClass: "tag-lsat", meta: "~2 hrs", open: false,
    sections: [
      { label: "momentum builders", tasks: [
        { text: "something creative — even just 10 min of drawing or editing", time: "10 min" }
      ]},
      { label: "lsat block", tasks: [
        { text: "timed LR section using this week's weak spots", time: "35 min" },
        { text: "review errors from the full week's error log", time: "30 min" },
        { text: "pull LSAT Demon analytics — note your top 2 weak areas", time: "15 min" }
      ]}
    ]
  },
  {
    name: "saturday", tag: "rest", tagClass: "tag-momentum", meta: "~30 min", open: false,
    sections: [
      { label: "light touch", tasks: [
        { text: "The Loophole: 20–30 min of casual reading, no pressure", time: "30 min" },
        { text: "enjoy your day guilt-free — rest is part of the process", time: "" }
      ]}
    ]
  }
];

let taskStates = {};

function loadState() {
  try {
    const saved = localStorage.getItem('lsat_tasks');
    if (saved) taskStates = JSON.parse(saved);
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('lsat_tasks', JSON.stringify(taskStates)); } catch(e) {}
}

function updateProgress() {
  const keys = Object.keys(taskStates);
  const total = keys.length;
  const done = keys.filter(k => taskStates[k]).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + total + ' tasks';
}

function buildDays() {
  const grid = document.getElementById('day-grid');
  let taskIdx = 0;

  DAYS.forEach((day, di) => {
    const card = document.createElement('div');
    card.className = 'day-card' + (day.open ? ' open' : '');

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = `
      <div class="day-left">
        <span class="day-name">${day.name}</span>
        <span class="day-tag ${day.tagClass}">${day.tag}</span>
      </div>
      <div class="day-right">
        <span class="day-meta">${day.meta}</span>
        <span class="chevron">▾</span>
      </div>
    `;
    header.addEventListener('click', () => card.classList.toggle('open'));

    const body = document.createElement('div');
    body.className = 'day-body';

    day.sections.forEach((sec, si) => {
      if (si > 0) {
        const div = document.createElement('div');
        div.className = 'divider';
        body.appendChild(div);
      }
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = sec.label;
      body.appendChild(lbl);

      sec.tasks.forEach(task => {
        const key = `task_${di}_${taskIdx}`;
        taskIdx++;

        if (!(key in taskStates)) taskStates[key] = false;

        const row = document.createElement('div');
        row.className = 'task-row' + (taskStates[key] ? ' done' : '');
        row.innerHTML = `
          <div class="checkbox">
            <svg class="checkmark" viewBox="0 0 9 7"><path d="M1 3.5L3.5 6L8 1"/></svg>
          </div>
          <div class="task-info">
            <div class="task-text">${task.text}</div>
            ${task.time ? `<div class="task-time">${task.time}</div>` : ''}
          </div>
        `;
        row.addEventListener('click', () => {
          taskStates[key] = !taskStates[key];
          row.classList.toggle('done', taskStates[key]);
          saveState();
          updateProgress();
        });
        body.appendChild(row);
      });
    });

    card.appendChild(header);
    card.appendChild(body);
    grid.appendChild(card);
  });

  updateProgress();
}

function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'archive') buildArchive();
}

function saveNotes() {
  const notes = {
    well: document.getElementById('note-well').value,
    hard: document.getElementById('note-hard').value,
    weak: document.getElementById('note-weak').value,
    other: document.getElementById('note-other').value,
    date: document.getElementById('week-label').textContent
  };
  try { localStorage.setItem('lsat_notes_current', JSON.stringify(notes)); } catch(e) {}
  const confirm = document.getElementById('save-confirm');
  confirm.textContent = 'saved ✓';
  setTimeout(() => confirm.textContent = '', 2000);
}

function loadNotes() {
  try {
    const saved = localStorage.getItem('lsat_notes_current');
    if (saved) {
      const n = JSON.parse(saved);
      document.getElementById('note-well').value = n.well || '';
      document.getElementById('note-hard').value = n.hard || '';
      document.getElementById('note-weak').value = n.weak || '';
      document.getElementById('note-other').value = n.other || '';
    }
  } catch(e) {}
}

function buildArchive() {
  const list = document.getElementById('archive-list');
  list.innerHTML = '';
  try {
    const archive = JSON.parse(localStorage.getItem('lsat_archive') || '[]');
    if (!archive.length) {
      list.innerHTML = '<div class="archive-empty">no archived weeks yet — past weeks will appear here each sunday when you reset the dashboard.</div>';
      return;
    }
    archive.reverse().forEach(week => {
      const card = document.createElement('div');
      card.className = 'archive-week';
      card.innerHTML = `
        <div class="archive-week-title">${week.date}</div>
        <div class="archive-week-meta">${week.done} / ${week.total} tasks completed</div>
        ${week.well ? `<div class="notes-label">what went well</div><div class="archive-notes">${week.well}</div>` : ''}
        ${week.hard ? `<div class="notes-label" style="margin-top:8px">what was hard</div><div class="archive-notes">${week.hard}</div>` : ''}
        ${week.weak ? `<div class="notes-label" style="margin-top:8px">weak areas</div><div class="archive-notes">${week.weak}</div>` : ''}
      `;
      list.appendChild(card);
    });
  } catch(e) {
    list.innerHTML = '<div class="archive-empty">nothing archived yet.</div>';
  }
}

loadState();
buildDays();
loadNotes();
</script>
</body>
</html>
